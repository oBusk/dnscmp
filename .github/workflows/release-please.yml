name: Release Please

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      cli_release_created: ${{ steps.release.outputs['packages/cli--release_created'] }}
      cli_tag_name: ${{ steps.release.outputs['packages/cli--tag_name'] }}
      cli_version: ${{ steps.release.outputs['packages/cli--version'] }}
      core_release_created: ${{ steps.release.outputs['packages/core--release_created'] }}
      providers_release_created: ${{ steps.release.outputs['packages/providers--release_created'] }}
      types_release_created: ${{ steps.release.outputs['packages/types--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          standalone: true
          run_install: true
          cache: true

      # Only needed for registry-url: it writes the .npmrc that NODE_AUTH_TOKEN
      # authentication requires for npm publish.
      # Node version must satisfy devEngines.runtime.version in package.json.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "26"
          registry-url: https://registry.npmjs.org

      - name: Build and publish @dnscmp/core
        if: ${{ needs.release-please.outputs.core_release_created }}
        run: |
          pnpm --filter @dnscmp/core build
          pnpm --filter @dnscmp/core pack
          npx npm@latest publish packages/core/*.tgz --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build and publish @dnscmp/providers
        if: ${{ needs.release-please.outputs.providers_release_created }}
        run: |
          pnpm --filter @dnscmp/providers build
          pnpm --filter @dnscmp/providers pack
          npx npm@latest publish packages/providers/*.tgz --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @dnscmp/types
        if: ${{ needs.release-please.outputs.types_release_created }}
        run: |
          pnpm --filter @dnscmp/types pack
          npx npm@latest publish packages/types/*.tgz --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build and publish dnscmp
        if: ${{ needs.release-please.outputs.cli_release_created }}
        run: |
          pnpm --filter dnscmp build:node
          pnpm --filter dnscmp pack
          npx npm@latest publish packages/cli/*.tgz --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-binaries:
    needs: release-please
    if: ${{ needs.release-please.outputs.cli_release_created }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # No setup-node: the build runs under the devEngines-managed Node
      # (pinned in package.json), and build-binary.mjs uses process.execPath
      # as the SEA base binary, so the pinned version is the single source
      # of truth for what the standalone executables embed.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          standalone: true
          run_install: true
          cache: true

      - name: Build binary
        run: pnpm --filter dnscmp build:binary

      - name: Upload binary to GitHub Release (linux)
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.release-please.outputs.cli_version }}"
          RAW_ARCH=$(uname -m)
          case "$RAW_ARCH" in
            x86_64) ARCH="x64" ;;
            aarch64|arm64) ARCH="arm64" ;;
            *) ARCH="$RAW_ARCH" ;;
          esac
          SRC="packages/cli/release/dnscmp-${VERSION}"
          DEST="packages/cli/release/dnscmp-${VERSION}-linux-${ARCH}"
          mv "$SRC" "$DEST"
          gh release upload "${{ needs.release-please.outputs.cli_tag_name }}" "$DEST"

      - name: Upload binary to GitHub Release (macos)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.release-please.outputs.cli_version }}"
          RAW_ARCH=$(uname -m)
          case "$RAW_ARCH" in
            x86_64) ARCH="x64" ;;
            aarch64|arm64) ARCH="arm64" ;;
            *) ARCH="$RAW_ARCH" ;;
          esac
          SRC="packages/cli/release/dnscmp-${VERSION}"
          DEST="packages/cli/release/dnscmp-${VERSION}-darwin-${ARCH}"
          mv "$SRC" "$DEST"
          gh release upload "${{ needs.release-please.outputs.cli_tag_name }}" "$DEST"

      - name: Upload binary to GitHub Release (windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ needs.release-please.outputs.cli_version }}"
          $rawArch = $env:PROCESSOR_ARCHITECTURE
          $arch = switch ($rawArch) {
            'AMD64' { 'x64' }
            'ARM64' { 'arm64' }
            default { $rawArch.ToLower() }
          }
          $src = "packages/cli/release/dnscmp-${version}.exe"
          $dest = "packages/cli/release/dnscmp-${version}-win32-${arch}.exe"
          Move-Item $src $dest
          gh release upload "${{ needs.release-please.outputs.cli_tag_name }}" $dest
        shell: pwsh
