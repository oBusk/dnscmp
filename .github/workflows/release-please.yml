name: Release Please

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      cli_release_created: ${{ steps.release.outputs['packages/cli--release_created'] }}
      cli_tag_name: ${{ steps.release.outputs['packages/cli--tag_name'] }}
      cli_version: ${{ steps.release.outputs['packages/cli--version'] }}
      core_release_created: ${{ steps.release.outputs['packages/core--release_created'] }}
      providers_release_created: ${{ steps.release.outputs['packages/providers--release_created'] }}
      types_release_created: ${{ steps.release.outputs['packages/types--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and publish @dnscmp/core
        if: ${{ needs.release-please.outputs.core_release_created }}
        run: |
          bun run --cwd packages/core build
          bun pm pack --cwd packages/core
          bunx npm@latest publish packages/core/*.tgz --provenance

      - name: Build and publish @dnscmp/providers
        if: ${{ needs.release-please.outputs.providers_release_created }}
        run: |
          bun run --cwd packages/providers build
          bun pm pack --cwd packages/providers
          bunx npm@latest publish packages/providers/*.tgz --provenance

      - name: Publish @dnscmp/types
        if: ${{ needs.release-please.outputs.types_release_created }}
        run: |
          bun pm pack --cwd packages/types
          bunx npm@latest publish packages/types/*.tgz --provenance

      - name: Build and publish dnscmp
        if: ${{ needs.release-please.outputs.cli_release_created }}
        run: |
          bun run --cwd packages/cli build
          bun pm pack --cwd packages/cli
          bunx npm@latest publish packages/cli/*.tgz --provenance

  build-binaries:
    needs: release-please
    if: ${{ needs.release-please.outputs.cli_release_created }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun run --cwd packages/cli build

      - name: Upload binary to GitHub Release (linux)
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.release-please.outputs.cli_version }}"
          RAW_ARCH=$(uname -m)
          case "$RAW_ARCH" in
            x86_64) ARCH="x64" ;;
            aarch64|arm64) ARCH="arm64" ;;
            *) ARCH="$RAW_ARCH" ;;
          esac
          SRC="packages/cli/release/dnscmp-${VERSION}"
          DEST="packages/cli/release/dnscmp-${VERSION}-linux-${ARCH}"
          mv "$SRC" "$DEST"
          gh release upload "${{ needs.release-please.outputs.cli_tag_name }}" "$DEST"

      - name: Upload binary to GitHub Release (macos)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.release-please.outputs.cli_version }}"
          RAW_ARCH=$(uname -m)
          case "$RAW_ARCH" in
            x86_64) ARCH="x64" ;;
            aarch64|arm64) ARCH="arm64" ;;
            *) ARCH="$RAW_ARCH" ;;
          esac
          SRC="packages/cli/release/dnscmp-${VERSION}"
          DEST="packages/cli/release/dnscmp-${VERSION}-darwin-${ARCH}"
          mv "$SRC" "$DEST"
          gh release upload "${{ needs.release-please.outputs.cli_tag_name }}" "$DEST"

      - name: Upload binary to GitHub Release (windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ needs.release-please.outputs.cli_version }}"
          $rawArch = $env:PROCESSOR_ARCHITECTURE
          $arch = switch ($rawArch) {
            'AMD64' { 'x64' }
            'ARM64' { 'arm64' }
            default { $rawArch.ToLower() }
          }
          $src = "packages/cli/release/dnscmp-${version}.exe"
          $dest = "packages/cli/release/dnscmp-${version}-win32-${arch}.exe"
          Move-Item $src $dest
          gh release upload "${{ needs.release-please.outputs.cli_tag_name }}" $dest
        shell: pwsh
