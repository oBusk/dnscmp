name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          standalone: true
          run_install: true
          cache: true

      - run: pnpm run typecheck

  artifact-shape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          standalone: true
          run_install: true
          cache: true

      - run: pnpm run build

      - name: Verify published artifact shape
        run: |
          test -f packages/core/dist/index.js
          test -f packages/providers/dist/index.js
          test -f packages/cli/dist/index.js
          head -n1 packages/cli/dist/index.js | grep -qx '#!/usr/bin/env node'

  cli-runtime:
    name: cli-runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          standalone: true
          run_install: true
          cache: true

      - run: pnpm run build

      - name: Smoke test --help
        run: node packages/cli/dist/index.js --

      - name: Smoke test live query
        run: node packages/cli/dist/index.js 1.1.1.1
