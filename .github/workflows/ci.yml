name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          standalone: true
          run_install: true
          cache: true

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: out-tsc
          key: typecheck-tsbuildinfo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            typecheck-tsbuildinfo-${{ runner.os }}-

      - run: pnpm run typecheck

  artifact-shape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          standalone: true
          run_install: true
          cache: true

      - run: pnpm run build

      - name: Verify published artifact shape
        run: |
          test -f packages/core/dist/index.js
          test -f packages/providers/dist/index.js
          test -f packages/cli/dist/index.js
          head -n1 packages/cli/dist/index.js | grep -qx '#!/usr/bin/env node'

  cli-runtime:
    name: cli-runtime (${{ matrix.runtime.label }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Deno's node-compat layer is untested for this CLI; keep it informational
    # until it has proven stable.
    continue-on-error: ${{ matrix.runtime.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        runtime:
          - { label: node-22, kind: node, version: "22.23.1", cmd: node }
          - { label: node-24, kind: node, version: "24.18.0", cmd: node }
          - { label: node-current, kind: node, version: "current", cmd: node }
          - { label: bun, kind: bun, cmd: bun }
          - {
              label: deno,
              kind: deno,
              cmd: deno run --allow-all,
              experimental: true,
            }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          standalone: true
          run_install: true
          cache: true

      # Builds with the devEngines-managed Node (pnpm runtime management),
      # independent of the matrix runtime below.
      - run: pnpm run build

      # Puts the matrix runtime on PATH so the smoke steps below exercise
      # the engines range of the published CLI.
      - if: matrix.runtime.kind == 'node'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ matrix.runtime.version }}
      - if: matrix.runtime.kind == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - if: matrix.runtime.kind == 'deno'
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5

      - name: Smoke test --help
        run: ${{ matrix.runtime.cmd }} packages/cli/dist/index.js --help

      - name: Smoke test live query
        run: ${{ matrix.runtime.cmd }} packages/cli/dist/index.js 1.1.1.1
